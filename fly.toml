app            = "market-oracle-ai"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PAPER_MODE  = "false"
  PORT        = "8000"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    port         = 8000
    timeout      = "10s"
    type         = "http"
