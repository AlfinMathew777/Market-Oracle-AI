[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --capture=no
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
markers =
    asyncio: mark test as async (handled by pytest-asyncio)
    integration: integration tests (full workflow, uses real DB)
    e2e: end-to-end API contract tests
    slow: slow tests (> 5 seconds)
    chaos: chaos/resilience tests

[coverage:run]
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */site-packages/*

[coverage:report]
fail_under = 40
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    raise NotImplementedError
    if __name__ == "__main__":
    def __repr__
